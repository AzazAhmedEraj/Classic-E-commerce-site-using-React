<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bengalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#bengalGrad)" opacity="0.15"/>

  <!-- Outer decorative ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#bengalGrad)" stroke-width="2" opacity="0.5"/>

  <!-- Inner circle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.3"/>

  <!-- Red sun (Bangladesh flag inspired) -->
  <circle cx="50" cy="48" r="18" fill="#dc2626" filter="url(#glow)"/>

  <!-- Golden decorative elements around sun -->
  <circle cx="50" cy="25" r="3" fill="#fbbf24"/>
  <circle cx="75" cy="50" r="3" fill="#fbbf24"/>
  <circle cx="50" cy="75" r="3" fill="#fbbf24"/>
  <circle cx="25" cy="50" r="3" fill="#fbbf24"/>

  <!-- Decorative arcs -->
  <path d="M 35 35 Q 50 20 65 35" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
  <path d="M 35 65 Q 50 80 65 65" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>

  <!-- Stylized "DB" monogram -->
  <text x="50" y="54" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Georgia, serif">DB</text>

  <!-- Green accent at bottom (representing green Bengal) -->
  <path d="M 30 85 Q 50 95 70 85" fill="none" stroke="#16a34a" stroke-width="2" opacity="0.6"/>
</svg>
